name: Daily insights

on:
  schedule:
    # 04:00 UTC every day (= 12:00 noon Singapore, 16:00 PST, off-peak everywhere)
    - cron: '0 4 * * *'
  workflow_dispatch:
    # Allow manual runs from the Actions tab for testing or backfills
    inputs:
      date:
        description: 'Date to generate for (YYYY-MM-DD), defaults to today UTC'
        required: false
        type: string

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout data repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies (none yet — pure stdlib)
        run: |
          python3 --version

      - name: Generate today's 10 articles
        env:
          # Increase delay between iTunes calls to be polite. Apple's CDN is
          # generous but we're doing 30+ calls per run × 1 generation × N categories.
          PYTHONUNBUFFERED: '1'
        run: |
          python3 tools/generate-daily.py ${{ inputs.date || '' }}

      - name: Show diff
        run: |
          git status --short
          git diff --stat

      - name: Commit + push
        run: |
          git config user.email "minimax@solverwatch.com"
          git config user.name "minimax cron job"
          git add -A
          if git diff --cached --quiet; then
            echo "No new articles — nothing to commit."
            exit 0
          fi
          DATE=$(date -u +%Y-%m-%d)
          git commit -m "chore: regenerate daily insights for $DATE

          Generated by the minimax cron job via GitHub Actions.
          10 articles from iTunes Search API data."
          git push